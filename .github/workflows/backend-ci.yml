name: Backend CI

on:
  pull_request:
    branches: [develop]
    paths:
      - "src/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "biome.json"
      - ".env.example"
      - "prisma.config.ts"
      - ".github/workflows/backend-ci.yml"

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Prisma validate
        run: npx prisma validate

      - name: Test
        run: npm test --if-present
